<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コーディングクリッカー</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>コードクリッカー</h1>
    <main>
        <hr>
        <section class="main">
            <div class="mainbar">
                <div class="Mbar">
                    <p class="Cmon">$<span class="Money"></span></p>
                    <p>毎秒: ＄<span class="aps">0</span></p>
                    <input type="button" value="コードを書く" class="cording">

                </div>
            </div>
            <div class="upgradebar">
                <div class="Ubar">
                    <table class="BuyUpgrade">
                    </table>
                </div>
            </div>
            <div class="statusbar">
                <div class="Sbar">
                    <h2>現在のアップグレード</h2>
                    <table class="status">
                    </table>
                </div>
            </div>
        </section>
        <section class="under">
            <hr>
        </section>
    </main>
    <footer>
        <input type="button" value="進行を保存" class="save">

        <div class="debug" hidden><!--このhiddenを消すとデバッグメニューが使えます-->
            <label title="この項目を有効にすると、画面更新時にデバッグメニューが隠れなくなります"><input type="checkbox" id="debugFlg">デバッグメニューを常に有効化する</label><br>
            <input type="button" value="所持金リセット" class="reset1">
            <input type="button" value="クリック強化リセット" class="reset2">
            <input type="button" value="所持施設リセット" class="reset3">
            <input type="button" value="施設強化リセット" class="reset4">
            <input type="button" value="完全リセット" class="resetAll"><br>
            <input type="button" value="所持金を$1万増やす" class="debugM1">
            <input type="button" value="所持金を$1億増やす" class="debugM2">
            <input type="button" value="所持金を$1兆増やす" class="debugM3">
            <input type="button" value="所持金を$1京増やす" class="debugM4">
            <input type="button" value="所持金を$1垓増やす" class="debugM5"><br>
            <label><input type="checkbox" class="debugAps1">Apsを0にする</label>
        </div>
    </footer>
    <!-- JS -->
    <script src="Clicker.js"></script>
</body>

</html>
